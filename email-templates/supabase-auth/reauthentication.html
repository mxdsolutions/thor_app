<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Your THOR verification code</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.04);">

          <tr>
            <td align="center" style="background:#000000;padding:28px 32px;">
              <img src="https://app.buildthor.com.au/logo.png" alt="THOR" width="72" height="72" style="display:block;border:0;width:72px;height:72px;border-radius:10px;" />
            </td>
          </tr>

          <tr>
            <td style="padding:32px 32px 8px;color:#0f172a;font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-0.01em;">
              Verify it's you
            </td>
          </tr>

          <tr>
            <td style="padding:0 32px 20px;color:#475569;font-size:15px;line-height:1.6;">
              Enter this code on the verification screen to continue. This code expires in 10 minutes.
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:0 32px 28px;">
              <div style="display:inline-block;background:#0f172a;color:#ffffff;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:28px;font-weight:700;letter-spacing:0.18em;padding:18px 32px;border-radius:10px;">
                {{ .Token }}
              </div>
            </td>
          </tr>

          <tr>
            <td style="border-top:1px solid #e2e8f0;background:#f8fafc;padding:20px 32px;color:#64748b;font-size:12px;line-height:1.5;">
              If you didn't try to verify, ignore this email and consider resetting your password.<br/><br/>
              <strong style="color:#0f172a;">THOR</strong> — built by MXD Solutions.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
